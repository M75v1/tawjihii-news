# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: tawjihii-news
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/news
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USER
        value: M75.zz
      - key: ADMIN_PASS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
