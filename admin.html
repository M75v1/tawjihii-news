<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>TAWJIHII | لوحة الإدارة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page">
  <div class="bg-pattern" aria-hidden="true"></div>

  <!-- تسجيل الدخول -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <span class="logo-icon">T</span>
        <h1>لوحة الإدارة</h1>
        <p>دخول المسؤولين فقط — TAWJIHII</p>
      </div>
      <form id="loginForm" class="login-form">
        <div class="form-row">
          <label for="username">اسم المستخدم</label>
          <input type="text" id="username" name="username" required autocomplete="username" />
        </div>
        <div class="form-row">
          <label for="password">كلمة المرور</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block">تسجيل الدخول</button>
        <p id="loginMessage" class="form-message" role="alert"></p>
      </form>
      <a href="index.html" class="back-link">← العودة للموقع</a>
    </div>
  </div>

  <!-- لوحة التحكم -->
  <div id="dashboardScreen" class="dashboard-screen hidden">
    <header class="admin-header">
      <div class="container admin-header-inner">
        <div class="admin-header-title">
          <span class="logo-icon small">T</span>
          <div>
            <strong>لوحة الإدارة</strong>
            <span id="adminUser" class="admin-user"></span>
          </div>
        </div>
        <div class="admin-header-actions">
          <button type="button" class="theme-toggle" id="themeToggle" aria-label="تبديل الوضع">
            <span class="theme-icon sun">☀️</span>
            <span class="theme-icon moon">🌙</span>
          </button>
          <button type="button" class="btn btn-outline" id="logoutBtn">تسجيل الخروج</button>
        </div>
      </div>
    </header>

    <main class="container admin-main">
      <section class="admin-card">
        <div class="section-head">
          <h2 id="formTitle">إضافة خبر جديد</h2>
          <p id="formSubtitle">يُحفظ في news.json ويظهر فوراً في الموقع و API</p>
        </div>
        <form id="adminForm" class="admin-form">
          <input type="hidden" id="editId" value="" />
          <div class="form-row">
            <label for="title">العنوان</label>
            <input type="text" id="title" required placeholder="عنوان الخبر" />
          </div>
          <div class="form-row">
            <label for="description">الوصف</label>
            <textarea id="description" rows="4" required placeholder="وصف مختصر"></textarea>
          </div>
          <div class="form-row">
            <label for="image">رابط الصورة</label>
            <input type="url" id="image" required placeholder="https://..." />
          </div>
          <div class="form-row">
            <label for="date">التاريخ</label>
            <input type="date" id="date" />
          </div>
          <div class="form-row registration-toggle">
            <label class="checkbox-label">
              <input type="checkbox" id="enableRegistration" />
              <span>إضافة زر «التسجيل في المدرسة»</span>
            </label>
            <p class="field-hint">اختياري — يظهر زر في بطاقة الخبر يفتح رابط التسجيل</p>
          </div>
          <div class="form-row registration-link-row hidden" id="registrationLinkRow">
            <label for="registrationLink">رابط التسجيل في المدرسة</label>
            <input type="url" id="registrationLink" placeholder="https://example.com/register" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">نشر الخبر</button>
            <button type="button" class="btn btn-outline hidden" id="cancelEditBtn">إلغاء التعديل</button>
          </div>
          <p id="formMessage" class="form-message" role="status"></p>
        </form>
      </section>

      <section class="admin-card">
        <div class="section-head section-head-row">
          <div>
            <h2>إدارة الأخبار</h2>
            <p id="newsListCount">0 خبر</p>
          </div>
          <button type="button" class="btn btn-danger-outline" id="deleteAllBtn">حذف جميع الأخبار</button>
        </div>
        <div id="adminNewsList" class="admin-news-list"></div>
      </section>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
